name: FlowLens CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  GCP_REGION: us-central1
  IMAGE_NAME: flowlens/backend

jobs:
  # ── Test ──────────────────────────────────────────────────────────────────
  test:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Run tests
        env:
          GEMINI_API_KEY: test-key-placeholder
          REDIS_URL: redis://localhost:6379/0
        run: |
          cd backend
          python -m pytest tests/ -v --tb=short

  # ── Build & Push ──────────────────────────────────────────────────────────
  build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      id-token: write  # for Workload Identity Federation

    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
      short_sha: ${{ steps.sha.outputs.short }}

    steps:
      - uses: actions/checkout@v4

      - name: Get short SHA
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build & push
        id: meta
        env:
          PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          TAG: ${{ steps.sha.outputs.short }}
        run: |
          REPO="${{ env.GCP_REGION }}-docker.pkg.dev/${PROJECT_ID}/${{ env.IMAGE_NAME }}"
          docker build \
            --platform linux/amd64 \
            --tag "${REPO}:${TAG}" \
            --tag "${REPO}:latest" \
            ./backend
          docker push "${REPO}:${TAG}"
          docker push "${REPO}:latest"
          echo "tags=${REPO}:${TAG}" >> "$GITHUB_OUTPUT"

  # ── Deploy ────────────────────────────────────────────────────────────────
  deploy:
    name: Terraform Deploy to Cloud Run
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    environment: production
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"

      - name: Terraform Init
        working-directory: infra/terraform
        run: terraform init -upgrade

      - name: Terraform Apply
        working-directory: infra/terraform
        env:
          TF_VAR_project_id: ${{ secrets.GCP_PROJECT_ID }}
          TF_VAR_region: ${{ env.GCP_REGION }}
          TF_VAR_gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
          TF_VAR_image_tag: ${{ needs.build.outputs.short_sha }}
        run: terraform apply -auto-approve

      - name: Verify deployment
        run: |
          CLOUD_RUN_URL=$(cd infra/terraform && terraform output -raw cloud_run_url)
          echo "Cloud Run URL: $CLOUD_RUN_URL"
          sleep 10
          curl -sf "${CLOUD_RUN_URL}/health" | jq .
