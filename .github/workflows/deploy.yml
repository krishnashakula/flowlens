name: FlowLens CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  GCP_REGION: us-central1
  IMAGE_NAME: flowlens/backend

jobs:
  # ── Test ──────────────────────────────────────────────────────────────────
  test:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Run tests
        env:
          GEMINI_API_KEY: test-key-placeholder
          REDIS_URL: redis://localhost:6379/0
        run: |
          cd backend
          python -m pytest tests/ -v --tb=short

  # ── Build & Push ──────────────────────────────────────────────────────────
  build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read

    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
      short_sha: ${{ steps.sha.outputs.short }}

    steps:
      - uses: actions/checkout@v4

      - name: Get short SHA
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build & push
        id: meta
        env:
          PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          TAG: ${{ steps.sha.outputs.short }}
        run: |
          REPO="${{ env.GCP_REGION }}-docker.pkg.dev/${PROJECT_ID}/${{ env.IMAGE_NAME }}"
          docker build \
            --platform linux/amd64 \
            --tag "${REPO}:${TAG}" \
            --tag "${REPO}:latest" \
            ./backend
          docker push "${REPO}:${TAG}"
          docker push "${REPO}:latest"
          echo "tags=${REPO}:${TAG}" >> "$GITHUB_OUTPUT"

  # ── Deploy ────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    environment: production
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy via Cloud Build
        env:
          PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
        run: |
          gcloud builds submit \
            --config=cloudbuild.yaml \
            --project="${PROJECT_ID}"

      - name: Verify deployment
        env:
          CLOUD_RUN_URL: https://flowlens-backend-rxwer3bgva-uk.a.run.app
        run: |
          sleep 15
          curl -sf "${CLOUD_RUN_URL}/health"
